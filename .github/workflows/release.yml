name: Build and Release macOS App

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Xcode Project Version
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          APP_VERSION="${RAW_TAG#v}"
          BUILD_NUMBER="${{ github.run_number }}"

          sed -i '' -e 's/MARKETING_VERSION = .*/MARKETING_VERSION = '"$APP_VERSION"';/' "MacCalendar.xcodeproj/project.pbxproj"
          xcrun agvtool new-version -all "$BUILD_NUMBER"

      - name: Resolve release metadata
        id: release_meta
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          APP_VERSION="${RAW_TAG#v}"
          DMG_NAME="Menucal-${APP_VERSION}.dmg"

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE_P12" ] || [ -z "$MACOS_CERTIFICATE_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "Missing Developer ID signing secrets."
            echo "Required secrets: MACOS_CERTIFICATE_P12, MACOS_CERTIFICATE_PASSWORD, KEYCHAIN_PASSWORD."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build SwiftUI App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          if [ -z "$APPLE_TEAM_ID" ] || [ -z "$DEVELOPER_ID_APPLICATION" ]; then
            echo "Missing Developer ID signing configuration."
            echo "Required secrets: APPLE_TEAM_ID, DEVELOPER_ID_APPLICATION."
            exit 1
          fi

          xcodebuild clean build \
            -project "MacCalendar.xcodeproj" \
            -scheme "MacCalendar" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$DEVELOPER_ID_APPLICATION" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            SYMROOT=$(pwd)/build \
            OBJROOT=$(pwd)/build

      - name: Verify app signature
        run: |
          codesign --verify --deep --strict --verbose=2 "build/Release/Menucal.app"
          codesign -dv --verbose=4 "build/Release/Menucal.app"
          spctl -a -vvv -t exec "build/Release/Menucal.app" || \
            echo "Gatekeeper assessment can fail before notarization; codesign verification passed."

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG package
        run: |
          mkdir -p dmg_source
          cp -r build/Release/Menucal.app dmg_source/

          create-dmg \
            --volname "Menucal Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Menucal.app" 150 120 \
            --hide-extension "Menucal.app" \
            --app-drop-link 450 120 \
            "${{ steps.release_meta.outputs.dmg_name }}" \
            "dmg_source/"

      - name: Sign and verify DMG
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          codesign --force --timestamp \
            --sign "$DEVELOPER_ID_APPLICATION" \
            "${{ steps.release_meta.outputs.dmg_name }}"
          codesign --verify --verbose=2 "${{ steps.release_meta.outputs.dmg_name }}"
          spctl -a -vvv -t open --context context:primary-signature "${{ steps.release_meta.outputs.dmg_name }}" || \
            echo "Gatekeeper assessment can fail before notarization; DMG codesign verification passed."

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release_meta.outputs.dmg_name }}
          tag_name: ${{ github.ref_name }}
          name: "Menucal ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
