name: Build and Release macOS App

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Xcode Project Version
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          APP_VERSION="${RAW_TAG#v}"
          BUILD_NUMBER="${{ github.run_number }}"

          sed -i '' -e 's/MARKETING_VERSION = .*/MARKETING_VERSION = '"$APP_VERSION"';/' "MacCalendar.xcodeproj/project.pbxproj"
          xcrun agvtool new-version -all "$BUILD_NUMBER"

      - name: Resolve release metadata
        id: release_meta
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          APP_VERSION="${RAW_TAG#v}"
          DMG_NAME="Menucal-${APP_VERSION}.dmg"

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build SwiftUI App
        run: |
          xcodebuild clean build \
            -project "MacCalendar.xcodeproj" \
            -scheme "MacCalendar" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=$(pwd)/build \
            OBJROOT=$(pwd)/build

      - name: Verify Universal Binary
        run: |
          APP_BUNDLE="build/Release/Menucal.app"
          APP_BINARY="build/Release/Menucal.app/Contents/MacOS/Menucal"
          ARCHITECTURES="$(lipo -archs "$APP_BINARY")"
          MINIMUM_SYSTEM_VERSION="$(/usr/libexec/PlistBuddy -c "Print :LSMinimumSystemVersion" "$APP_BUNDLE/Contents/Info.plist")"

          echo "Architectures: $ARCHITECTURES"
          echo "Minimum macOS version: $MINIMUM_SYSTEM_VERSION"
          lipo -info "$APP_BINARY"

          if [[ " $ARCHITECTURES " != *" arm64 "* || " $ARCHITECTURES " != *" x86_64 "* ]]; then
            echo "Expected a Universal Binary containing arm64 and x86_64."
            exit 1
          fi

          if [[ "$MINIMUM_SYSTEM_VERSION" != "13.3" ]]; then
            echo "Expected minimum macOS version 13.3."
            exit 1
          fi

      - name: Apply and verify ad-hoc signature
        run: |
          codesign --force --deep --sign - "build/Release/Menucal.app"
          codesign --verify --deep --strict --verbose=2 "build/Release/Menucal.app"
          codesign -dv --verbose=4 "build/Release/Menucal.app"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG package
        run: |
          mkdir -p dmg_source
          cp -r build/Release/Menucal.app dmg_source/

          create-dmg \
            --volname "Menucal Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Menucal.app" 150 120 \
            --hide-extension "Menucal.app" \
            --app-drop-link 450 120 \
            "${{ steps.release_meta.outputs.dmg_name }}" \
            "dmg_source/"

      - name: Verify DMG package
        run: |
          hdiutil verify "${{ steps.release_meta.outputs.dmg_name }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release_meta.outputs.dmg_name }}
          tag_name: ${{ github.ref_name }}
          name: "Menucal ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
